<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Presentación Personal</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background: linear-gradient(135deg, #ffe4ec, #ffd6e7);
      font-family: Arial, sans-serif;
    }

    .titulo{
      color:#c2185b;
      font-weight:bold;
    }

    .card-custom{
      border:none;
      border-radius:20px;
      box-shadow:0 6px 15px rgba(0,0,0,0.15);
    }

    .rosa1{ background:#f8bbd0; }
    .rosa2{ background:#f48fb1; }
    .rosa3{ background:#ec407a; color:white; }

    img{
      width:150px;
      height:150px;
      border-radius:50%;
      border:4px solid white;
    }

    footer{
      color:#880e4f;
      font-weight:bold;
    }
  </style>

</head>
<body>
<div class="container py-5">
  <iframe width="100%" height="315" src="src/index.html" ></iframe>
</div>

<div class="container py-5">

  <div class="text-center mb-5">
    <img src="./gato.jpg" alt="Mi foto">
    <h1 class="titulo mt-3">Maria Fernanda</h1>
    <p>Estudiante | Apasionada por la tecnología 💻</p>
  </div>

  <div class="row g-4">

    <div class="col-sm-12 col-md-6 col-lg-4">
      <div class="card card-custom rosa1 p-4 text-center">
        <h3>🌸 Sobre mí</h3>
        <p>Soy estudiante y me gusta aprender sobre desarrollo web.</p>
      </div>
    </div>

    <div class="col-sm-12 col-md-6 col-lg-4">
      <div class="card card-custom rosa2 p-4 text-center">
        <h3>💖 Hobbies</h3>
        <p>Escuchar música, estudiar y crear proyectos digitales.</p>
      </div>
    </div>

    <div class="col-sm-12 col-md-12 col-lg-4">
      <div class="card card-custom rosa3 p-4 text-center">
        <h3>🎀 Meta</h3>
        <p>Convertirme en una excelente desarrolladora web.</p>
      </div>
    </div>

  </div>

  <footer class="text-center mt-5">
    Presentación creada con Bootstrap 💕
  </footer>

</div>

</body>
</html>
